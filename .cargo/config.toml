[target.aarch64-linux-android]
linker = "aarch64-linux-android24-clang"
ar     = "llvm-ar"
rustflags = [
    "-C", "target-feature=+crt-static",
    "-C", "link-arg=-static",
    "-C", "link-arg=-Wl,--gc-sections",
    "-C", "strip=symbols",
]

[target.armv7-linux-androideabi]
linker = "armv7a-linux-androideabi24-clang"
ar     = "llvm-ar"
rustflags = [
    "-C", "target-feature=+crt-static",
    "-C", "link-arg=-static",
]
